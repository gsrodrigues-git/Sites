name: Publicar preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Baixar site
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Preparar arquivos do site
        run: |
          mkdir _site
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='_site' \
            --exclude='readme.md' \
            ./ _site/

      - name: Enviar site para publicacao
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar preview
        id: deployment
        uses: actions/deploy-pages@v4
