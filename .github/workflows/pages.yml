name: Publicar preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  verificar-pages:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Verificar GitHub Pages
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          status=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages")

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GitHub Pages ainda precisa ser ativado em Settings > Pages com a fonte GitHub Actions."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: verificar-pages
    if: needs.verificar-pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Baixar site
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar arquivos do site
        run: |
          mkdir _site
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='_site' \
            --exclude='readme.md' \
            ./ _site/

      - name: Enviar site para publicacao
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar preview
        id: deployment
        uses: actions/deploy-pages@v4
